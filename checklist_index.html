<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Checklist Task</title>
  <link rel="stylesheet" href="form-style.css">
</head>

<body>

  <div class="container">

    <div class="page-title">
      📋 Add Task to Checklist Management System
    </div>

    <div class="page-subtitle">
      Create New Task Assignment for SMM | SBMPPL | SBC | SAU | SSE
    </div>

    <!-- Loading state -->
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      Loading form data…
    </div>

    <!-- Form content (hidden until data loads) -->
    <div id="formContent" style="display:none;">

      <div class="form-group">
        <label>Checklist Type <span class="required">*</span></label>
        <select id="checklistType">
          <option value="">Select Checklist Type</option>
        </select>
      </div>

      <div class="form-group">
        <label>Task Name <span class="required">*</span></label>
        <input type="text" id="taskName">
      </div>

      <div class="form-group">
        <label>Task Description <span class="required">*</span></label>
        <textarea id="taskDescription" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>Reference Link</label>
        <input type="text" id="referenceLink" placeholder="https://... (optional)">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="multiDoer" onchange="toggleMultiDoer()">
        <label for="multiDoer">
          (Check this box ☑ to Activate → Select Multiple Doers)
        </label>
      </div>

      <div class="form-group">
        <label>Search Doer Designation <span class="required">*</span></label>
        <input type="text" id="designationSearch"
               placeholder="Type designation name..."
               onkeyup="searchDesignation()">
      </div>

      <div class="form-group">
        <label>Matching Results</label>
        <div id="searchResults"></div>
      </div>

      <div class="form-group">
        <label>Selected Designation(s)</label>
        <div id="selectedDoers"></div>
      </div>

      <div class="form-group">
        <label>Frequency <span class="required">*</span></label>
        <select id="frequency">
          <option value="">Select Frequency</option>
        </select>
      </div>

      <div class="row">
        <div class="col">
          <label>First Due Date <span class="required">*</span></label>
          <input type="date" id="firstDueDate">
        </div>
        <div class="col">
          <label>Time <span class="required">*</span></label>
          <input type="time" id="taskTime">
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitTask()">
        Submit Task
      </button>

    </div>

    <div class="footer">
      Checklist Management System v1.0 | Designed by Prasenjit Sarkar
    </div>

  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">✅ Task Saved Successfully</div>
      <div class="modal-body">Task has been saved successfully.</div>
      <div class="modal-footer">
        <button class="modal-btn" onclick="closeSuccessModal()">OK</button>
      </div>
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal">
    <div class="modal-content">
      <div class="modal-header" style="background:#dc2626;">❌ Error</div>
      <div class="modal-body" id="errorModalMsg">Something went wrong.</div>
      <div class="modal-footer">
        <button class="modal-btn" style="background:#dc2626;"
                onclick="closeErrorModal()">OK</button>
      </div>
    </div>
  </div>

  <script>
    // ── Configuration ─────────────────────────────────────────────────────────
    const API = 'https://script.google.com/macros/s/AKfycbyHZyijRDw122UgqAu-KDtCl5vmN9YRnZitveeszWPEQ3pP_-TcOXa9RrRGy_DC-rGF/exec';

    // ── State ─────────────────────────────────────────────────────────────────
    let allDesignations = [];
    let selectedDoers   = [];

    // ── Load dropdown data on page load ───────────────────────────────────────
    window.onload = function() {
      fetch(`${API}?api=true&action=getDropdownData`)
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            showErrorModal('Failed to load form data: ' + data.error);
            return;
          }
          loadForm(data);
          document.getElementById('loadingState').style.display  = 'none';
          document.getElementById('formContent').style.display   = 'block';
        })
        .catch(err => {
          showErrorModal('Connection error. Please refresh and try again.');
          console.error(err);
        });
    };

    function loadForm(data) {
      // Checklist Types
      const checklist = document.getElementById('checklistType');
      checklist.innerHTML = '<option value="">Select Checklist Type</option>';
      data.checklistTypes.forEach(item => {
        checklist.innerHTML += `<option value="${item}">${item}</option>`;
      });

      // Designations
      allDesignations = data.designations;

      // Frequencies
      const frequency = document.getElementById('frequency');
      frequency.innerHTML = '<option value="">Select Frequency</option>';
      data.frequencies.forEach(item => {
        frequency.innerHTML += `<option value="${item}">${item}</option>`;
      });
    }

    // ── Doer search ───────────────────────────────────────────────────────────
    function toggleMultiDoer() {
      if (!document.getElementById('multiDoer').checked) {
        selectedDoers = [];
        document.getElementById('selectedDoers').innerHTML  = '';
        document.getElementById('searchResults').innerHTML  = '';
        document.getElementById('designationSearch').value = '';
      }
    }

    function searchDesignation() {
      const keyword = document.getElementById('designationSearch').value.toLowerCase();
      const results = document.getElementById('searchResults');
      results.innerHTML = '';
      if (keyword.length < 2) return;

      const matches = allDesignations.filter(item =>
        item.toLowerCase().includes(keyword)
      );

      matches.forEach(item => {
        results.innerHTML += `
          <div class="result-item" onclick="selectDoer('${item.replace(/'/g, "\\'")}')">
            ${item}
          </div>`;
      });
    }

    function selectDoer(doer) {
      const multiMode = document.getElementById('multiDoer').checked;
      if (!multiMode) {
        selectedDoers = [doer];
      } else {
        if (!selectedDoers.includes(doer)) selectedDoers.push(doer);
      }
      renderSelectedDoers();
      document.getElementById('searchResults').innerHTML  = '';
      document.getElementById('designationSearch').value = '';
    }

    function renderSelectedDoers() {
      const container = document.getElementById('selectedDoers');
      container.innerHTML = '';
      selectedDoers.forEach(doer => {
        container.innerHTML += `
          <div class="selected-item">
            ${doer}
            <span class="remove-btn"
                  onclick="removeDoer('${doer.replace(/'/g, "\\'")}')">✖</span>
          </div>`;
      });
    }

    function removeDoer(doer) {
      selectedDoers = selectedDoers.filter(x => x !== doer);
      renderSelectedDoers();
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    function submitTask() {
      const data = {
        checklistType:    document.getElementById('checklistType').value,
        taskName:         document.getElementById('taskName').value,
        taskDescription:  document.getElementById('taskDescription').value,
        referenceLink:    document.getElementById('referenceLink').value,
        doerDesignation:  selectedDoers,
        frequency:        document.getElementById('frequency').value,
        firstDueDate:     document.getElementById('firstDueDate').value,
        taskTime:         document.getElementById('taskTime').value
      };

      // Clear errors
      document.querySelectorAll('.error-field').forEach(el => {
        el.classList.remove('error-field');
      });

      // Validate
      let isValid = true;

      if (!data.checklistType) {
        document.getElementById('checklistType').classList.add('error-field');
        isValid = false;
      }
      if (!data.taskName) {
        document.getElementById('taskName').classList.add('error-field');
        isValid = false;
      }
      if (!data.taskDescription) {
        document.getElementById('taskDescription').classList.add('error-field');
        isValid = false;
      }
      if (!data.frequency) {
        document.getElementById('frequency').classList.add('error-field');
        isValid = false;
      }
      if (!data.firstDueDate) {
        document.getElementById('firstDueDate').classList.add('error-field');
        isValid = false;
      }
      if (!data.taskTime) {
        document.getElementById('taskTime').classList.add('error-field');
        isValid = false;
      }
      if (selectedDoers.length === 0) {
        document.getElementById('designationSearch').classList.add('error-field');
        isValid = false;
      }

      if (!isValid) return;

      // Submit
      const btn = document.getElementById('submitBtn');
      btn.disabled   = true;
      btn.textContent = 'Submitting…';

      const url = `${API}?api=true&action=saveTask&data=${encodeURIComponent(JSON.stringify(data))}`;

      fetch(url)
        .then(r => r.json())
        .then(result => {
          if (result.error) {
            showErrorModal('Failed to save task: ' + result.error);
          } else {
            showSuccessModal();
            resetForm();
          }
        })
        .catch(err => {
          showErrorModal('Connection error. Please try again.');
          console.error(err);
        })
        .finally(() => {
          btn.disabled    = false;
          btn.textContent = 'Submit Task';
        });
    }

    function resetForm() {
      document.getElementById('taskName').value         = '';
      document.getElementById('taskDescription').value  = '';
      document.getElementById('referenceLink').value    = '';
      document.getElementById('designationSearch').value = '';
      document.getElementById('firstDueDate').value     = '';
      document.getElementById('taskTime').value         = '';
      document.getElementById('checklistType').selectedIndex = 0;
      document.getElementById('frequency').selectedIndex    = 0;
      document.getElementById('multiDoer').checked          = false;
      selectedDoers = [];
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('selectedDoers').innerHTML = '';
    }

    // ── Modals ────────────────────────────────────────────────────────────────
    function showSuccessModal() {
      document.getElementById('successModal').style.display = 'block';
    }

    function closeSuccessModal() {
      document.getElementById('successModal').style.display = 'none';
    }

    function showErrorModal(msg) {
      document.getElementById('errorModalMsg').textContent = msg;
      document.getElementById('errorModal').style.display  = 'block';
    }

    function closeErrorModal() {
      document.getElementById('errorModal').style.display = 'none';
    }
  </script>

</body>
</html>
